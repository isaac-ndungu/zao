services:
  - type: web
    name: zao-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: zao-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zao-redis
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: zaoapi.settings
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "False"
  - type: worker
    name: zao-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: zao-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zao-redis
          property: connectionString
      - key: SERVICE_TYPE
        value: worker
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "False"
  - type: worker
    name: zao-celery-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: zao-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zao-redis
          property: connectionString
      - key: SERVICE_TYPE
        value: beat
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "False"

  - type: pserv
    name: zao-db
    plan: starter
    runtime: image
    image:
      url: postgres:16-alpine

  - type: redis
    name: zao-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: ["0.0.0.0/0"]
