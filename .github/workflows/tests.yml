name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Django Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zao_user
          POSTGRES_PASSWORD: zao_pass
          POSTGRES_DB: zao_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6380:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Validate migrations
        env:
          DATABASE_URL: postgresql://zao_user:zao_pass@localhost:5433/zao_db
          REDIS_URL: redis://localhost:6380/0
          DEBUG: "True"
          SECRET_KEY: test-secret-key-for-ci-only
          FIELD_ENCRYPTION_KEY: dGhpcy1pcy1hLTY0LWJ5dGUtc2VjcmV0LWtleS1mb3ItY2k=
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: |
          cd backend && python manage.py migrate --noinput
          python manage.py migrate --run-syncdb
          python manage.py check --deploy

      - name: Run pytest with coverage
        env:
          DATABASE_URL: postgresql://zao_user:zao_pass@localhost:5433/zao_db
          REDIS_URL: redis://localhost:6380/0
          DEBUG: "True"
          SECRET_KEY: test-secret-key-for-ci-only
          FIELD_ENCRYPTION_KEY: dGhpcy1pcy1hLTY0LWJ5dGUtc2VjcmV0LWtleS1mb3ItY2k=
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: |
          cd backend && pytest --tb=short --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  client-tests:
    name: React Client Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
        working-directory: client

      - name: Run lint
        run: npm run lint
        working-directory: client

      - name: Run typecheck
        run: npm run typecheck
        working-directory: client

      - name: Run tests
        run: npm run test
        working-directory: client
