name: Docker Image CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: zao-backend:test

      - name: Run a quick sanity check
        run: |
          docker run --rm \
            -e SECRET_KEY=test-secret-key \
            -e FIELD_ENCRYPTION_KEY=test-encryption-key \
            -e DATABASE_URL=sqlite:///tmp/test.db \
            zao-backend:test python -c "import django; print(f'Django {django.VERSION}')"

  docker-client:
    name: Build Client Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          load: true
          tags: zao-client:test

      - name: Run a quick sanity check
        run: |
          docker run --rm zao-client:test npm --version

  docker-compose:
    name: Full Docker Compose Stack
    runs-on: ubuntu-latest
    needs: [docker-backend, docker-client]
    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env file
        run: |
          cat > backend/.env <<'EOF'
          SECRET_KEY=ci-test-secret-key
          FIELD_ENCRYPTION_KEY=ci-test-encryption-key
          DATABASE_URL=postgres://zao_user:zao_pass@db:5432/zao_db
          REDIS_URL=redis://redis:6379/0
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS=http://localhost:5173
          NOTIFICATIONS_DRY_RUN=True
          MPESA_ENVIRONMENT=sandbox
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          CELERY_TASK_ALWAYS_EAGER=False
          EOF

      - name: Build all images with docker compose
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for web to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health/ > /dev/null 2>&1; then
              echo "Web service is up"
              exit 0
            fi
            echo "Waiting for web service... ($i/30)"
            sleep 2
          done
          echo "Web service did not become ready"
          docker compose logs web
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down
