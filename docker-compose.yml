services:
  web:
    build: ./backend
    command: gunicorn zaoapi.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: zao_db
      POSTGRES_USER: zao_user
      POSTGRES_PASSWORD: zao_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zao_user -d zao_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: ./backend
    command: celery -A zaoapi worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build: ./backend
    command: celery -A zaoapi beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
