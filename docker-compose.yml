services:
  web:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      SERVICE_TYPE: web
      CELERY_TASK_ALWAYS_EAGER: "False"
    depends_on:
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: zao_db
      POSTGRES_USER: zao_user
      POSTGRES_PASSWORD: zao_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zao_user -d zao_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  celery_worker:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      SERVICE_TYPE: worker
      CELERY_TASK_ALWAYS_EAGER: "False"
    depends_on:
      redis:
        condition: service_started

  celery_beat:
    build: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      SERVICE_TYPE: beat
      CELERY_TASK_ALWAYS_EAGER: "False"
    depends_on:
      redis:
        condition: service_started

  client:
    build:
      context: ./client
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_API_PROXY: http://web:8000
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: http://web:8000
    depends_on:
      - web

volumes:
  postgres_data:
